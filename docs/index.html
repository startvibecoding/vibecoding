<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCoding Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --md-primary: #1976D2;
            --md-primary-dark: #1565C0;
            --md-primary-light: #BBDEFB;
            --md-accent: #FF4081;
            --md-surface: #FFFFFF;
            --md-background: #FAFAFA;
            --md-on-primary: #FFFFFF;
            --md-on-surface: #212121;
            --md-on-surface-medium: #757575;
            --md-on-surface-disabled: #BDBDBD;
            --md-divider: #E0E0E0;
            --md-error: #D32F2F;
            --md-success: #388E3C;
            --md-shadow-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --md-shadow-2: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
            --md-shadow-3: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
            --md-shadow-4: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            --md-radius: 4px;
            --sidebar-width: 280px;
            --header-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: var(--md-on-surface);
            background-color: var(--md-background);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* App Bar */
        .app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: var(--md-shadow-2);
            z-index: 1000;
        }

        .app-bar__menu {
            display: none;
            background: none;
            border: none;
            color: var(--md-on-primary);
            cursor: pointer;
            padding: 8px;
            margin-right: 16px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .app-bar__menu:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .app-bar__title {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.02em;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-bar__logo {
            width: 32px;
            height: 32px;
        }

        .app-bar__actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.5);
            background: transparent;
            color: var(--md-on-primary);
            cursor: pointer;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            text-decoration: none;
        }

        .github-btn:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.8);
        }

        .github-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .lang-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.5);
            background: transparent;
            color: var(--md-on-primary);
            cursor: pointer;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
        }

        .lang-chip:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.8);
        }

        .lang-chip.active {
            background-color: rgba(255,255,255,0.2);
            border-color: var(--md-on-primary);
        }

        /* Layout */
        .layout {
            display: flex;
            margin-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
        }

        /* Sidebar / Navigation Drawer */
        .nav-drawer {
            position: fixed;
            top: var(--header-height);
            left: 0;
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height));
            background-color: var(--md-surface);
            border-right: 1px solid var(--md-divider);
            overflow-y: auto;
            z-index: 900;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-drawer__header {
            padding: 16px;
            border-bottom: 1px solid var(--md-divider);
        }

        .nav-drawer__title {
            font-size: 14px;
            font-weight: 500;
            color: var(--md-on-surface-medium);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .nav-drawer__list {
            list-style: none;
            padding: 8px 0;
        }

        .nav-drawer__item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--md-on-surface);
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 14px;
            font-weight: 400;
        }

        .nav-drawer__item:hover {
            background-color: rgba(0, 0, 0, 0.04);
        }

        .nav-drawer__item.active {
            background-color: var(--md-primary-light);
            color: var(--md-primary);
            font-weight: 500;
        }

        .nav-drawer__item .material-icons {
            margin-right: 16px;
            font-size: 20px;
            color: var(--md-on-surface-medium);
        }

        .nav-drawer__item.active .material-icons {
            color: var(--md-primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 32px 48px;
            max-width: 900px;
        }

        .content-card {
            background-color: var(--md-surface);
            border-radius: var(--md-radius);
            box-shadow: var(--md-shadow-1);
            padding: 32px;
            min-height: 400px;
        }

        /* Markdown Styles */
        .content-card h1 {
            font-size: 28px;
            font-weight: 500;
            color: var(--md-on-surface);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--md-divider);
            letter-spacing: 0.02em;
        }

        .content-card h2 {
            font-size: 22px;
            font-weight: 500;
            color: var(--md-on-surface);
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--md-divider);
            letter-spacing: 0.02em;
        }

        .content-card h3 {
            font-size: 18px;
            font-weight: 500;
            color: var(--md-on-surface);
            margin: 24px 0 12px;
        }

        .content-card h4 {
            font-size: 16px;
            font-weight: 500;
            color: var(--md-on-surface-medium);
            margin: 20px 0 8px;
        }

        .content-card p {
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 16px;
            color: var(--md-on-surface);
        }

        .content-card a {
            color: var(--md-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .content-card a:hover {
            text-decoration: underline;
        }

        .content-card code {
            font-family: 'Roboto Mono', monospace;
            background-color: #F5F5F5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
            color: var(--md-error);
        }

        .content-card pre {
            background-color: #263238;
            color: #ECEFF1;
            padding: 16px;
            border-radius: var(--md-radius);
            overflow-x: auto;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.6;
        }

        .content-card pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            font-size: inherit;
        }

        .content-card ul, .content-card ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .content-card li {
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 4px;
        }

        .content-card table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .content-card th, .content-card td {
            border: 1px solid var(--md-divider);
            padding: 12px 16px;
            text-align: left;
        }

        .content-card th {
            background-color: #FAFAFA;
            font-weight: 500;
            color: var(--md-on-surface);
        }

        .content-card tr:hover {
            background-color: #F5F5F5;
        }

        .content-card blockquote {
            border-left: 4px solid var(--md-primary);
            padding: 12px 16px;
            margin: 16px 0;
            background-color: #E3F2FD;
            color: var(--md-on-surface);
            font-size: 14px;
        }

        .content-card hr {
            border: none;
            border-top: 1px solid var(--md-divider);
            margin: 24px 0;
        }

        .content-card strong {
            font-weight: 500;
        }

        /* Loading & Error States */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            color: var(--md-on-surface-medium);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--md-divider);
            border-top-color: var(--md-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            padding: 24px;
            background-color: #FFEBEE;
            border-radius: var(--md-radius);
            color: var(--md-error);
        }

        .error-state h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--md-error);
        }

        .error-state p {
            font-size: 14px;
            color: #B71C1C;
            margin-bottom: 0;
        }

        /* Snackbar */
        .snackbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #323232;
            color: white;
            padding: 14px 24px;
            border-radius: var(--md-radius);
            box-shadow: var(--md-shadow-3);
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .snackbar.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Footer */
        .footer {
            margin-left: var(--sidebar-width);
            padding: 24px 48px;
            text-align: center;
            color: var(--md-on-surface-medium);
            font-size: 12px;
        }

        /* Overlay for mobile */
        .overlay {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 850;
        }

        .overlay.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                padding: 24px 32px;
            }
        }

        @media (max-width: 768px) {
            .app-bar__menu {
                display: flex;
            }

            .nav-drawer {
                transform: translateX(-100%);
            }

            .nav-drawer.open {
                transform: translateX(0);
                box-shadow: var(--md-shadow-4);
            }

            .main-content {
                margin-left: 0;
                padding: 16px;
            }

            .content-card {
                padding: 24px 16px;
            }

            .footer {
                margin-left: 0;
                padding: 16px;
            }

            .github-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .github-btn svg {
                width: 14px;
                height: 14px;
            }
        }

        /* Scrollbar */
        .nav-drawer::-webkit-scrollbar {
            width: 6px;
        }

        .nav-drawer::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav-drawer::-webkit-scrollbar-thumb {
            background-color: var(--md-on-surface-disabled);
            border-radius: 3px;
        }

        .nav-drawer::-webkit-scrollbar-thumb:hover {
            background-color: var(--md-on-surface-medium);
        }
    </style>
</head>
<body>
    <!-- App Bar -->
    <header class="app-bar">
        <button class="app-bar__menu" onclick="toggleDrawer()" aria-label="Menu">
            <span class="material-icons">menu</span>
        </button>
        <span class="app-bar__title">
            <img src="assets/logo.svg" alt="VibeCoding" class="app-bar__logo">
            VibeCoding Documentation
        </span>
        <div class="app-bar__actions">
            <a href="https://github.com/fuckvibecoding/vibecoding" target="_blank" rel="noopener noreferrer" class="github-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
            <button class="lang-chip active" onclick="switchLanguage('en')">English</button>
            <button class="lang-chip" onclick="switchLanguage('zh')">中文</button>
        </div>
    </header>

    <!-- Overlay for mobile -->
    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

    <!-- Layout -->
    <div class="layout">
        <!-- Navigation Drawer -->
        <nav class="nav-drawer" id="nav-drawer">
            <div class="nav-drawer__header">
                <span class="nav-drawer__title" id="nav-title">Documentation</span>
            </div>
            <ul class="nav-drawer__list" id="nav-list">
                <!-- Dynamic navigation items -->
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-card" id="content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Loading documentation...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 VibeCoding. All rights reserved.</p>
    </footer>

    <!-- Snackbar -->
    <div class="snackbar" id="snackbar"></div>

    <script>
        // Configuration
        const DOCS = {
            en: {
                title: 'Documentation',
                items: [
                    { id: 'README', icon: 'home', title: 'Home' },
                    { id: 'getting-started', icon: 'rocket_launch', title: 'Quick Start' },
                    { id: 'cli-reference', icon: 'terminal', title: 'CLI Reference' },
                    { id: 'configuration', icon: 'settings', title: 'Configuration' },
                    { id: 'architecture', icon: 'architecture', title: 'Architecture' },
                    { id: 'tools', icon: 'build', title: 'Tools' },
                    { id: 'skills', icon: 'psychology', title: 'Skills' },
                    { id: 'security', icon: 'security', title: 'Security' },
                    { id: 'sessions', icon: 'forum', title: 'Sessions' },
                    { id: 'development', icon: 'code', title: 'Development' },
                    { id: 'faq', icon: 'help_outline', title: 'FAQ' }
                ]
            },
            zh: {
                title: '文档目录',
                items: [
                    { id: 'README', icon: 'home', title: '文档首页' },
                    { id: 'getting-started', icon: 'rocket_launch', title: '快速入门' },
                    { id: 'cli-reference', icon: 'terminal', title: '命令行参考' },
                    { id: 'configuration', icon: 'settings', title: '配置详解' },
                    { id: 'architecture', icon: 'architecture', title: '系统架构' },
                    { id: 'tools', icon: 'build', title: '工具系统' },
                    { id: 'skills', icon: 'psychology', title: '技能系统' },
                    { id: 'security', icon: 'security', title: '安全与沙箱' },
                    { id: 'sessions', icon: 'forum', title: '会话管理' },
                    { id: 'development', icon: 'code', title: '开发指南' },
                    { id: 'faq', icon: 'help_outline', title: '常见问题' }
                ]
            }
        };

        let currentLanguage = 'en';
        let currentDoc = 'README';

        // Hash Router
        function getHashRoute() {
            const hash = window.location.hash.slice(1); // Remove #
            if (!hash) return null;

            const parts = hash.split('/').filter(Boolean);
            if (parts.length >= 2) {
                return {
                    lang: parts[0],
                    doc: parts.slice(1).join('/')
                };
            }
            return null;
        }

        function setHashRoute(lang, doc) {
            window.location.hash = `#/${lang}/${doc}`;
        }

        function handleHashChange() {
            const route = getHashRoute();
            if (route && DOCS[route.lang]) {
                if (currentLanguage !== route.lang) {
                    currentLanguage = route.lang;
                    updateLanguageButtons();
                }
                loadDocument(route.doc, false); // false = don't update hash again
            }
        }

        // Navigation
        function updateNavigation() {
            const navList = document.getElementById('nav-list');
            const navTitle = document.getElementById('nav-title');
            const langDocs = DOCS[currentLanguage];

            navTitle.textContent = langDocs.title;

            navList.innerHTML = langDocs.items.map(item => `
                <li>
                    <a class="nav-drawer__item ${item.id === currentDoc ? 'active' : ''}" 
                       data-doc="${item.id}"
                       onclick="navigateTo('${item.id}')">
                        <span class="material-icons">${item.icon}</span>
                        <span>${item.title}</span>
                    </a>
                </li>
            `).join('');
        }

        function getDocPath(lang, docId) {
            return `${lang}/${docId}.md`;
        }

        async function loadDocument(docId, updateHash = true) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Loading...</span>
                </div>
            `;

            try {
                const response = await fetch(getDocPath(currentLanguage, docId));
                if (!response.ok) {
                    throw new Error(`Document not found (${response.status})`);
                }
                const text = await response.text();
                contentDiv.innerHTML = marked.parse(text);
                currentDoc = docId;

                // Update hash
                if (updateHash) {
                    setHashRoute(currentLanguage, docId);
                }

                // Update active state
                document.querySelectorAll('.nav-drawer__item').forEach(item => {
                    item.classList.toggle('active', item.getAttribute('data-doc') === docId);
                });

                // Handle internal links
                handleInternalLinks();

                // Scroll to top
                window.scrollTo(0, 0);

                // Close mobile drawer
                closeDrawer();

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error-state">
                        <h3>Error Loading Document</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function handleInternalLinks() {
            document.querySelectorAll('.content-card a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.endsWith('.md')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const docId = href.replace('.md', '').replace('../', '').replace('./', '');
                        navigateTo(docId);
                    });
                }
            });
        }

        function navigateTo(docId) {
            loadDocument(docId, true);
        }

        function switchLanguage(lang) {
            if (lang === currentLanguage) return;
            currentLanguage = lang;
            updateLanguageButtons();
            updateNavigation();
            loadDocument(currentDoc, true);
            showSnackbar(lang === 'en' ? 'Switched to English' : '已切换到中文');
        }

        function updateLanguageButtons() {
            document.querySelectorAll('.lang-chip').forEach(btn => {
                const btnLang = btn.textContent === 'English' ? 'en' : 'zh';
                btn.classList.toggle('active', btnLang === currentLanguage);
            });
        }

        // Mobile drawer
        function toggleDrawer() {
            const drawer = document.getElementById('nav-drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function closeDrawer() {
            const drawer = document.getElementById('nav-drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Snackbar
        function showSnackbar(message) {
            const snackbar = document.getElementById('snackbar');
            snackbar.textContent = message;
            snackbar.classList.add('show');
            setTimeout(() => {
                snackbar.classList.remove('show');
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check hash route first
            const route = getHashRoute();
            if (route && DOCS[route.lang]) {
                currentLanguage = route.lang;
                currentDoc = route.doc;
            }

            updateLanguageButtons();
            updateNavigation();
            loadDocument(currentDoc, !route); // Only update hash if no initial route

            // Listen for hash changes
            window.addEventListener('hashchange', handleHashChange);
        });
    </script>
</body>
</html>
